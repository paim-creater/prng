name: CI

on: [push, pull_request, workflow_dispatch]

jobs:
  test-and-benchmark:
    name: ${{ matrix.os }} / ${{ matrix.cc }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            cc: gcc
          - os: ubuntu-latest
            cc: clang
          - os: macos-latest
            cc: clang
          - os: windows-latest
            cc: gcc

    steps:
      - uses: actions/checkout@v4

      - name: Build ADC-Bolt test
        run: ${{ matrix.cc }} -O3 -march=native -o test_bolt${{ matrix.os == 'windows-latest' && '.exe' || '' }} test_bolt.c src/adcbolt.c -I.

      - name: Run ADC-Bolt self-test
        run: ./test_bolt${{ matrix.os == 'windows-latest' && '.exe' || '' }}

      - name: Build Tempest v3 test
        run: ${{ matrix.cc }} -O3 -march=native -o test_tempest${{ matrix.os == 'windows-latest' && '.exe' || '' }} test_tempest.c src/tempest_v3.c -I.

      - name: Run Tempest v3 self-test
        run: ./test_tempest${{ matrix.os == 'windows-latest' && '.exe' || '' }}

      - name: Build benchmark
        run: ${{ matrix.cc }} -O3 -march=native -o benchmark${{ matrix.os == 'windows-latest' && '.exe' || '' }} benchmark.c src/adcbolt.c src/tempest_v3.c -I.

      - name: Run benchmark
        run: ./benchmark${{ matrix.os == 'windows-latest' && '.exe' || '' }}
